name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t devsecops-demo:v1 .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-demo:v1
          format: table

      - name: Tag Image
        run: |
          docker tag devsecops-demo:v1 854653744091.dkr.ecr.ap-south-1.amazonaws.com/devsecops-demo:latest

      - name: Push Image to ECR
        run: |
          docker push 854653744091.dkr.ecr.ap-south-1.amazonaws.com/devsecops-demo:latest


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 854653744091.dkr.ecr.ap-south-1.amazonaws.com

            docker stop devsecops-demo || true
            docker rm devsecops-demo || true

            docker pull 854653744091.dkr.ecr.ap-south-1.amazonaws.com/devsecops-demo:latest


            docker run -d \
              --name devsecops-demo \
              -p 80:80 \
              ${{ secrets.ECR_REPOSITORY }}:latest
